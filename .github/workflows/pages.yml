name: Deploy site to GitHub Pages

# Publishes the static site/ directory (index.html, polis.html, llms.txt) as a
# GitHub Pages artifact. No build step: the content is hand-written static HTML/txt.
# No CNAME file is created — when publishing from a custom Actions workflow, Pages
# ignores CNAME and the custom domain is configured in Settings → Pages.
#
# NOTE: the deploy step fails until the repo owner sets
#   Settings → Pages → Source → GitHub Actions.
# That is expected and is a one-time manual switch, not a workflow bug.

on:
  push:
    branches: [main]
    paths:
      - 'site/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

# Allow one concurrent deployment; do not cancel an in-progress run, so a
# running deploy completes rather than being interrupted by a new push.
concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload site/ as Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: 'site'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
